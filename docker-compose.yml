version: "3.9"

# ─── Shared configuration ─────────────────────────────────────────────────────
x-app-env: &app-env
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  APP_ENV: ${APP_ENV:-production}

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── API (production) ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      <<: *app-env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ── API (development — live reload) ───────────────────────────────────────
  app-dev:
    build:
      context: .
      target: builder          # reuse the builder stage; source mounted as volume
    restart: unless-stopped
    environment:
      <<: *app-env
      APP_ENV: development
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ./init_db.py:/app/init_db.py
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir -r /build/requirements.txt -q &&
             python /app/init_db.py --seed &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app"
    profiles:
      - dev                    # only starts with: docker compose --profile dev up
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  postgres_data:
